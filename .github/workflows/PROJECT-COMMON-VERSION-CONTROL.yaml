# ===================================================================
# PROJECT-COMMON-VERSION-CONTROL.yaml
# 버전 자동 관리 워크플로우 v2.1
# ===================================================================
#
# [안전망] main(프로덕션)에 릴리스 PR을 거치지 않은 직접 push가 발생했을 때만
# patch 버전을 자동으로 증가시키고 모든 관련 파일을 동기화합니다.
# 정상 릴리스(develop→main PR)의 버전 증가는 RELEASE-CHANGELOG이 머지 전에 수행하며,
# 그 머지 push는 version.yml 변경을 포함하므로 이 워크플로우는 가드에 의해 건너뜁니다.
#
# ===================================================================
# 주요 개선사항:
# - 버전 동기화 자동화 (version.yml ↔ 프로젝트 파일)
# - 에러 처리 강화
# - 로깅 개선
# - 스크립트 안정성 향상
# - [v2.1] Race Condition 방지를 위한 pull-rebase + retry 로직 추가
#
# 지원 프로젝트 타입:
# - spring: build.gradle
# - flutter: pubspec.yaml
# - react/node: package.json
# - react-native: Info.plist + build.gradle
# - react-native-expo: app.json
# - python: pyproject.toml
# - basic: version.yml만 관리
# ===================================================================

name: PROJECT-VERSION-CONTROL

# 동시 실행 방지 (https://github.com/Cassiiopeia/projectops/issues/63)
concurrency:
  group: version-increment
  cancel-in-progress: false

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'CHANGELOG.md'
      - 'CHANGELOG.json'
      - 'version.yml'  # 무한 루프 방지
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-bump:
    name: 버전 자동 증가
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - name: 릴리스 머지 여부 확인 (안전망 가드)
        id: release_guard
        run: |
          BEFORE="${{ github.event.before }}"
          # 브랜치 신규 생성(zero SHA)·강제 push 등으로 BEFORE가 없으면 직전 커밋 1개만 검사
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            RANGE="HEAD^..HEAD"
          else
            RANGE="$BEFORE..HEAD"
          fi
          if git diff --name-only $RANGE 2>/dev/null | grep -qx "version.yml"; then
            echo "is_release_merge=true" >> $GITHUB_OUTPUT
            echo "✅ 릴리스 머지 감지 (push에 version.yml 변경 포함) — 버전 증가 건너뜀"
          else
            echo "is_release_merge=false" >> $GITHUB_OUTPUT
            echo "⚠️ main 직접 push 감지 — 안전망 버전 증가 실행"
          fi

      - name: 버전 관리 스크립트 권한 설정
        if: steps.release_guard.outputs.is_release_merge != 'true'
        run: |
          chmod +x .github/scripts/version_manager.sh
          echo "버전 관리 스크립트 권한 설정 완료"

      - name: 현재 버전 확인 및 동기화
        id: current_version
        if: steps.release_guard.outputs.is_release_merge != 'true'
        run: |
          echo "🔍 현재 버전 확인 및 동기화 중..."
          CURRENT_VERSION=$(./.github/scripts/version_manager.sh get | tail -n 1)
          if [ -z "$CURRENT_VERSION" ]; then
            echo "❌ 버전 확인 실패"
            exit 1
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "✅ 현재 버전: $CURRENT_VERSION"

      - name: 새 버전 계산 및 업데이트
        id: version
        if: steps.release_guard.outputs.is_release_merge != 'true'
        run: |
          echo "⬆️ 패치 버전 증가 중..."
          NEW_VERSION=$(./.github/scripts/version_manager.sh increment | tail -n 1)
          if [ -z "$NEW_VERSION" ]; then
            echo "❌ 버전 업데이트 실패"
            exit 1
          fi
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "✅ 새 버전: $NEW_VERSION"

      - name: 프로젝트 타입 확인
        id: project_info
        if: steps.release_guard.outputs.is_release_merge != 'true'
        run: |
          if [ -f "version.yml" ]; then
            # 멀티타입 — project_types 배열을 csv로 추출 (v4.1.0 SSOT: 단수 project_type 키는 읽지 않음)
            PROJECT_TYPES=$(grep "^project_types:" version.yml 2>/dev/null | sed -E 's/.*\[([^]]*)\].*/\1/' | tr -d '" ' || echo "")
            # primary 타입 = 배열 첫 항목
            PROJECT_TYPE=$(echo "$PROJECT_TYPES" | cut -d',' -f1)
            [ -z "$PROJECT_TYPE" ] && PROJECT_TYPE="unknown"
            [ -z "$PROJECT_TYPES" ] && PROJECT_TYPES="$PROJECT_TYPE"
            echo "project_type=$PROJECT_TYPE" >> $GITHUB_OUTPUT
            echo "project_types=$PROJECT_TYPES" >> $GITHUB_OUTPUT
            echo "프로젝트 타입: $PROJECT_TYPE (배열: $PROJECT_TYPES)"
          else
            echo "project_type=unknown" >> $GITHUB_OUTPUT
            echo "project_types=unknown" >> $GITHUB_OUTPUT
            echo "⚠️ version.yml 파일을 찾을 수 없습니다."
          fi

      - name: 변경사항 확인 및 커밋
        if: steps.release_guard.outputs.is_release_merge != 'true'
        run: |
          echo "📝 Git 설정 및 변경사항 확인 중..."
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 모든 변경사항 스테이징
          git add -A

          # 변경사항이 있는지 확인
          if git diff --staged --quiet; then
            echo "ℹ️ 변경사항이 없습니다. (이미 동기화됨)"
          else
            echo "📤 변경사항 커밋 중..."
            REPO_NAME=$(basename "${{ github.repository }}")
            COMMIT_MSG="$REPO_NAME 버전 정보 관리: chore: 버전 ${{ steps.version.outputs.new_version }} [skip ci]"

            if git commit -m "$COMMIT_MSG"; then
              # Race Condition 방지: pull-rebase 후 push (최대 3회 재시도)
              MAX_RETRIES=3
              RETRY_COUNT=0
              PUSH_SUCCESS=false

              while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "🔄 Push 시도 $RETRY_COUNT/$MAX_RETRIES..."

                if git push; then
                  PUSH_SUCCESS=true
                  echo "✅ 버전 업데이트 커밋 완료"
                  break
                else
                  echo "⚠️ Push 실패, remote 변경사항 동기화 중..."

                  # remote에서 최신 변경사항 가져와서 rebase
                  if git pull --rebase origin ${{ github.event.repository.default_branch || 'main' }}; then
                    echo "✅ Rebase 성공, 다시 push 시도..."
                  else
                    echo "❌ Rebase 실패, 충돌 해결 필요"
                    git rebase --abort 2>/dev/null || true
                    exit 1
                  fi
                fi
              done

              if [ "$PUSH_SUCCESS" = false ]; then
                echo "❌ $MAX_RETRIES회 시도 후에도 push 실패"
                exit 1
              fi
            else
              echo "❌ 커밋 실패"
              exit 1
            fi
          fi

      - name: Git 태그 생성
        if: steps.release_guard.outputs.is_release_merge != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          TAG_NAME="v$NEW_VERSION"
          
          echo "🏷️ Git 태그 생성 중: $TAG_NAME"
          
          # 기존 태그 확인
          if git tag -l | grep -q "^$TAG_NAME$"; then
            echo "⚠️ 태그 $TAG_NAME이 이미 존재합니다. 건너뛰기."
          else
            if git tag "$TAG_NAME" && git push origin "$TAG_NAME"; then
              echo "✅ Git 태그 생성 완료: $TAG_NAME"
            else
              echo "❌ 태그 생성 실패: $TAG_NAME"
              exit 1
            fi
          fi

      - name: 버전 업데이트 완료 요약
        if: always()
        run: |
          echo ""
          echo "🎉 버전 업데이트 워크플로우 완료!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 업데이트 요약:"
          echo "  📦 프로젝트 타입: ${{ steps.project_info.outputs.project_type }}"
          echo "  📌 이전 버전: ${{ steps.current_version.outputs.current_version }}"
          echo "  🆙 새 버전: ${{ steps.version.outputs.new_version }}"
          echo "  🔖 Git 태그: v${{ steps.version.outputs.new_version }}"
          echo "  📝 커밋: ${{ github.sha }}"
          echo "  🌿 브랜치: ${{ github.ref_name }}"
          echo "  🕐 시간: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          # 실패한 경우에만 에러 표시
          if [ "${{ job.status }}" != "success" ]; then
            echo "❌ 일부 단계에서 오류가 발생했습니다. 로그를 확인해주세요."
          else
            echo "✅ 모든 단계가 성공적으로 완료되었습니다."
          fi