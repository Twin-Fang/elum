# ===================================================================
# PROJECT-COMMON-RELEASE-CHANGELOG.yaml
# 릴리스 + 체인지로그 관리 워크플로우 (구 RELEASE-CHANGELOG)
# ===================================================================
#
# 이 워크플로우는 main 브랜치로 릴리스 PR(develop→main)이 생성될 때 릴리스 노트를 만들어
# CHANGELOG.json / CHANGELOG.md를 업데이트하고 자동 머지합니다.
#
# 릴리스 노트 생성기(provider)는 version.yml options.changelog.provider로 고른다 (#455):
#   - coderabbit(미설정 시 기본 — 기존 동작 보존): Summary 요청 후 폴링, 무응답 시 사다리로 폴백
#   - github-ai(신규 설치 기본): GitHub Models API — permissions: models: read만으로 동작(API 키 불필요)
#   - openai/gemini/claude/ollama: OpenAI 호환 API (MODEL_API_KEY secret 필요)
#   - commit: 커밋 분석 (AI·네트워크 무의존)
# 폴백 사다리는 .github/scripts/changelog_providers/ladder.py가 실행:
#   선택 provider → github-ai → commit 순으로 시도, commit은 항상 완주하는 최후 보루.
# 폴백 발생 시 PR 댓글로 "○○ 실패 → △△ 사용"을 알린다.
#
# ===================================================================
# 🔑 필수 GitHub Secrets
# ===================================================================
# _GITHUB_PAT_TOKEN: PR 머지용 PAT (권한: repo)
# ===================================================================
#
# 작동 방식:
# 1. main 브랜치로 릴리스 PR(develop→main) 생성 시 트리거
# 1-1. PR head가 develop이 아니면 전체 파이프라인 스킵 (실수 feature PR 보호)
# 2. PR 제목을 즉시 🚀 Deploy 형식으로 변경
# 3. CodeRabbit Summary 요청 후 최대 10분 대기
# 4. Summary 내용을 파싱하여 CHANGELOG 파일들 업데이트
# 5. PR 자동 머지 후 배포 트리거
#
# API Rate Limit 참고:
# - GITHUB_TOKEN: 1,000 요청/시간/레포 (Actions 내)
# - PAT: 5,000 요청/시간/계정
# - 이 워크플로우 예상 사용량: ~130회/실행
# ===================================================================

name: RELEASE CHANGELOG

on:
  pull_request_target:
    types: [opened]
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Job 1: CodeRabbit Summary 감지 및 파싱
  detect-and-parse:
    name: CodeRabbit Summary 감지 및 파싱
    # head 가드: main이 default라 feature PR의 base가 main으로 잘못 열릴 수 있다.
    # develop발 릴리스 PR만 automerge 파이프라인을 탄다. (후속 job은 needs 조건으로 연쇄 스킵)
    if: github.event.pull_request.head.ref == 'develop'
    runs-on: ubuntu-latest
    outputs:
      summary_found: ${{ steps.detect_summary.outputs.summary_found }}
      version: ${{ steps.get_version.outputs.version }}
      project_type: ${{ steps.get_version.outputs.project_type }}
      project_types: ${{ steps.get_version.outputs.project_types }}
      changelog_provider: ${{ steps.get_version.outputs.changelog_provider }}
      changelog_base_url: ${{ steps.get_version.outputs.changelog_base_url }}
    steps:
      - name: PR 본문 초기화
        id: clear_body
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          # PR opened 직후엔 GitHub API replication lag로 body가 비어 보일 수 있으므로
          # 비어 있으면 최대 3회(2초 간격) 재시도해 본다. 한 번이라도 Summary가 잡히면 본문 보존.
          CURRENT_BODY=""
          for attempt in 1 2 3; do
            CURRENT_BODY=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                                "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" | \
                                jq -r '.body // ""')
            if [ -n "$CURRENT_BODY" ] && [ "$CURRENT_BODY" != "null" ]; then
              echo "[try $attempt] body length=$(echo -n "$CURRENT_BODY" | wc -c)"
              break
            fi
            echo "[try $attempt] body 비어 있음 — replication lag 가능, 재시도"
            sleep 2
          done

          if echo "$CURRENT_BODY" | grep -q "Summary by CodeRabbit"; then
            echo "✅ 이미 'Summary by CodeRabbit' 감지 — 본문 초기화 건너뜀"
            echo "$CURRENT_BODY" > pr_body.md
            echo "already_found=true" >> $GITHUB_OUTPUT
          else
            echo "🗑️ PR #$PR_NUMBER 본문 초기화 중..."
            curl -s -H "Authorization: token ${{ secrets._GITHUB_PAT_TOKEN }}" \
                 -H "Content-Type: application/json" \
                 -X PATCH \
                 -d '{"body": ""}' \
                 "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}"
            echo "✅ PR 본문 초기화 완료"
            echo "already_found=false" >> $GITHUB_OUTPUT
          fi

      - name: 저장소 체크아웃
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: 버전 스크립트 권한 설정
        run: |
          if [ -f ".github/scripts/version_manager.sh" ]; then
            chmod +x .github/scripts/version_manager.sh
            echo "✅ 버전 스크립트 권한 설정 완료"
          fi

      - name: 버전 정보 확인
        id: get_version
        run: |
          VERSION="1.0.0"
          PROJECT_TYPE="unknown"

          # 버전 스크립트 사용
          if [ -f ".github/scripts/version_manager.sh" ]; then
            VERSION=$(./.github/scripts/version_manager.sh get | tail -n 1)
          elif [ -f "version.yml" ]; then
            VERSION=$(grep "^version:" version.yml | sed 's/version: *"\([^"]*\)".*/\1/')
          # 폴백: 프로젝트 타입별 버전 파일
          elif [ -f "build.gradle" ]; then
            VERSION=$(grep "version = '" build.gradle | sed "s/version = '//" | sed "s/'//")
            PROJECT_TYPE="spring"
          elif [ -f "pubspec.yaml" ]; then
            VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: *\([0-9.]*\).*/\1/')
            PROJECT_TYPE="flutter"
          elif [ -f "package.json" ]; then
            VERSION=$(jq -r '.version' package.json)
            PROJECT_TYPE="node"
          elif [ -f "pyproject.toml" ]; then
            VERSION=$(grep "^version = " pyproject.toml | sed 's/version = *"\([^"]*\)".*/\1/')
            PROJECT_TYPE="python"
          fi

          # 멀티타입 — project_types 배열을 csv로 추출 (v4.1.0 SSOT: 단수 project_type 키는 읽지 않음)
          PROJECT_TYPES=$(grep "^project_types:" version.yml 2>/dev/null | sed -E 's/.*\[([^]]*)\].*/\1/' | tr -d '" ' || echo "")
          # primary 타입 = 배열 첫 항목 (배열이 없으면 위 폴백에서 감지한 값 유지)
          if [ -n "$PROJECT_TYPES" ]; then
            PROJECT_TYPE=$(echo "$PROJECT_TYPES" | cut -d',' -f1)
          fi
          [ -z "$PROJECT_TYPES" ] && PROJECT_TYPES="$PROJECT_TYPE"

          # changelog provider 읽기 (#455) — version.yml options.changelog.provider.
          # 미설정이면 coderabbit(기존 동작 100% 보존). commit/github-ai면 CodeRabbit 폴링을 건너뛴다.
          CHANGELOG_PROVIDER=$(grep -A5 "changelog:" version.yml 2>/dev/null | grep "provider:" | head -1 | sed -E 's/.*provider: *"?([a-z-]+)"?.*/\1/' || true)
          [ -z "$CHANGELOG_PROVIDER" ] && CHANGELOG_PROVIDER="coderabbit"
          # ollama 등 자체 호스팅 provider의 base_url (#455) — 없으면 빈 값
          CHANGELOG_BASE_URL=$(grep -A5 "changelog:" version.yml 2>/dev/null | grep "base_url:" | head -1 | sed -E 's/.*base_url: *"?([^" ]*)"?.*/\1/' || true)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "project_type=$PROJECT_TYPE" >> $GITHUB_OUTPUT
          echo "project_types=$PROJECT_TYPES" >> $GITHUB_OUTPUT
          echo "changelog_provider=$CHANGELOG_PROVIDER" >> $GITHUB_OUTPUT
          echo "changelog_base_url=$CHANGELOG_BASE_URL" >> $GITHUB_OUTPUT
          echo "✅ 버전: $VERSION, 프로젝트 타입: $PROJECT_TYPE (배열: $PROJECT_TYPES), changelog: $CHANGELOG_PROVIDER"

      - name: PR 제목 즉시 변경
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          VERSION="${{ steps.get_version.outputs.version }}"
          TODAY=$(date '+%Y%m%d')
          NEW_TITLE="🚀 Deploy ${TODAY}-v${VERSION}"

          curl -s -H "Authorization: token ${{ secrets._GITHUB_PAT_TOKEN }}" \
               -H "Content-Type: application/json" \
               -X PATCH \
               -d "{\"title\": \"${NEW_TITLE}\"}" \
               "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}"

          echo "✅ PR 제목 변경 완료: $NEW_TITLE"

      - name: CodeRabbit Summary 요청
        # 이미 Summary가 있으면 요청 불필요. provider가 coderabbit일 때만 요청(#455 — 아니면 fallback 사다리로).
        if: steps.clear_body.outputs.already_found != 'true' && steps.get_version.outputs.changelog_provider == 'coderabbit'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}

          curl -s -H "Authorization: token ${{ secrets._GITHUB_PAT_TOKEN }}" \
               -H "Content-Type: application/json" \
               -X POST \
               -d '{"body": "@coderabbitai summary"}' \
               "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments"

          echo "✅ CodeRabbit Summary 요청 완료"

      - name: CodeRabbit Summary 감지 (폴링)
        id: detect_summary
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          CHANGELOG_PROVIDER="${{ steps.get_version.outputs.changelog_provider }}"

          # provider가 coderabbit이 아니면(commit/github-ai/openai 등) CodeRabbit 폴링을 건너뛰고
          # summary_found=false로 내려 fallback-summary(provider 사다리)가 릴리스 노트를 만들게 한다 (#455).
          # 단, changelog-deploy 스킬이 미리 Summary를 넣었으면(already_found) 그건 그대로 존중.
          if [ "${{ steps.clear_body.outputs.already_found }}" != "true" ] && [ "$CHANGELOG_PROVIDER" != "coderabbit" ]; then
            echo "ℹ️ changelog provider='$CHANGELOG_PROVIDER' — CodeRabbit 폴링 생략, fallback 사다리로 위임"
            echo "summary_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # changelog-deploy가 이미 Summary를 작성한 경우 폴링 생략
          if [ "${{ steps.clear_body.outputs.already_found }}" = "true" ]; then
            echo "✅ 초기화 단계에서 이미 Summary 감지 — 폴링 생략"
            # clear_body가 만든 pr_body.md는 직후 체크아웃에서 덮어써져 사라지므로,
            # 체크아웃 이후 시점인 여기서 PR 본문을 다시 받아 파일로 저장해야 업로드 artifact가 비지 않는다
            curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                 "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" | \
                 jq -r '.body // ""' > pr_body.md
            echo "summary_found=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          MAX_ATTEMPTS=120  # 10분 = 120 * 5초
          ATTEMPT=0

          echo "🔍 PR #$PR_NUMBER에서 CodeRabbit Summary 감지 시작..."
          echo "⏰ 최대 대기 시간: 10분 (5초마다 체크)"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "[$ATTEMPT/$MAX_ATTEMPTS] Summary 확인 중... ($(date '+%H:%M:%S'))"

            # JSON API로 PR body 가져오기 (Public/Private 동일하게 동작)
            PR_BODY=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                           "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" | \
                           jq -r '.body // ""')

            # 본문이 비어있는지 확인
            if [ -z "$PR_BODY" ] || [ "$PR_BODY" = "null" ]; then
              echo "⏳ PR 본문이 비어있습니다"
            elif echo "$PR_BODY" | grep -q "Summary by CodeRabbit"; then
              echo "✅ CodeRabbit Summary 발견!"
              echo "$PR_BODY" > pr_body.md
              echo "summary_found=true" >> $GITHUB_OUTPUT
              break
            else
              echo "⏳ CodeRabbit Summary 아직 없음"
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              sleep 5
            fi
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "⚠️ 10분 대기 후에도 Summary를 찾을 수 없습니다"
            echo "summary_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary 파일 업로드
        if: steps.detect_summary.outputs.summary_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pr-content
          path: pr_body.md
          retention-days: 1

  # Job 1-B: provider 사다리 — CodeRabbit Summary가 없을 때 릴리스 노트를 만든다 (#455).
  #   provider=commit/github-ai/openai 계열 모두 이 job으로 위임된다. 사다리 로직은
  #   .github/scripts/changelog_providers/ladder.py (선택 provider → github-ai → commit 순).
  #   github-ai는 GitHub Models API — 아래 permissions의 models: read + GITHUB_TOKEN만으로
  #   동작(API 키 불필요). commit은 AI·네트워크 무의존이라 항상 완주하는 최후 보루.
  fallback-summary:
    name: 릴리스 노트 생성 (provider 사다리)
    runs-on: ubuntu-latest
    needs: detect-and-parse
    if: needs.detect-and-parse.outputs.summary_found == 'false'
    # job 단위 permissions는 workflow 단위를 대체한다 — github-ai(Models API)용 models: read 포함
    permissions:
      contents: read
      models: read
    outputs:
      summary_found: ${{ steps.generate.outputs.summary_found }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: provider 사다리로 릴리스 노트 생성
        id: generate
        env:
          CHANGELOG_PROVIDER: ${{ needs.detect-and-parse.outputs.changelog_provider }}
          CHANGELOG_BASE_URL: ${{ needs.detect-and-parse.outputs.changelog_base_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # main(프로덕션) 대비 커밋을 분석하도록 origin/main 확보 — HEAD는 develop 체크아웃
          git fetch origin "${{ github.event.pull_request.base.ref }}" 2>/dev/null || true

          echo "🪜 changelog provider 사다리 실행 (provider=$CHANGELOG_PROVIDER)"
          python3 .github/scripts/changelog_providers/ladder.py

          if [ ! -f pr_body.md ]; then
            echo "❌ provider 사다리 완주 실패 — pr_body.md 없음"
            echo "summary_found=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          # PR 본문에 업데이트
          ESCAPED=$(cat pr_body.md | jq -Rs .)
          curl -s -H "Authorization: token ${{ secrets._GITHUB_PAT_TOKEN }}" \
               -H "Content-Type: application/json" \
               -X PATCH \
               -d "{\"body\": $ESCAPED}" \
               "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}"

          # 폴백 발생 시 PR 댓글로 알림 (#455 — "○○ 실패 → △△ 사용")
          NOTICE=$(jq -r '.notice // ""' provider_result.json 2>/dev/null || echo "")
          if [ -n "$NOTICE" ]; then
            COMMENT=$(printf '⚠️ changelog provider 폴백: %s' "$NOTICE" | jq -Rs .)
            curl -s -H "Authorization: token ${{ secrets._GITHUB_PAT_TOKEN }}" \
                 -H "Content-Type: application/json" \
                 -X POST -d "{\"body\": $COMMENT}" \
                 "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" > /dev/null
            echo "📣 폴백 알림 댓글 등록: $NOTICE"
          fi

          echo "✅ 릴리스 노트 생성·PR 본문 업데이트 완료 ($(jq -r '.provider // "?"' provider_result.json 2>/dev/null))"
          echo "summary_found=true" >> $GITHUB_OUTPUT

      - name: 폴백 Summary 파일 업로드
        if: steps.generate.outputs.summary_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pr-content
          path: pr_body.md
          retention-days: 1

  # Job 2: CHANGELOG 업데이트
  update-changelog:
    name: CHANGELOG 업데이트
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump_version.outputs.new_version }}
    needs: [detect-and-parse, fallback-summary]
    if: |
      always() &&
      (needs.detect-and-parse.outputs.summary_found == 'true' ||
       needs.fallback-summary.outputs.summary_found == 'true')
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Git 설정
        run: |
          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin $HEAD_BRANCH

      - name: Summary 파일 다운로드
        uses: actions/download-artifact@v4
        with:
          name: pr-content

      - name: 릴리스 버전 확정 (patch +1)
        id: bump_version
        run: |
          chmod +x .github/scripts/version_manager.sh
          NEW_VERSION=$(./.github/scripts/version_manager.sh increment | tail -n 1)
          if [ -z "$NEW_VERSION" ]; then
            echo "❌ 버전 증가 실패"
            exit 1
          fi
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "✅ 릴리스 버전 확정: $NEW_VERSION"

      - name: PR 제목 확정 버전으로 갱신
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          VERSION="${{ steps.bump_version.outputs.new_version }}"
          TODAY=$(date '+%Y%m%d')
          NEW_TITLE="🚀 Deploy ${TODAY}-v${VERSION}"

          curl -s -H "Authorization: token ${{ secrets._GITHUB_PAT_TOKEN }}" \
               -H "Content-Type: application/json" \
               -X PATCH \
               -d "{\"title\": \"${NEW_TITLE}\"}" \
               "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}"

          echo "✅ PR 제목 확정 버전으로 갱신: $NEW_TITLE"

      - name: CHANGELOG 업데이트
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          VERSION="${{ steps.bump_version.outputs.new_version }}"
          PROJECT_TYPE="${{ needs.detect-and-parse.outputs.project_type }}"
          PROJECT_TYPES="${{ needs.detect-and-parse.outputs.project_types }}"
          TODAY=$(date '+%Y-%m-%d')
          TIMESTAMP=$(date '+%Y-%m-%dT%H:%M:%SZ')

          echo "📝 CHANGELOG 업데이트 시작..."
          echo "📋 프로젝트: $PROJECT_TYPE v$VERSION"

          # Python 스크립트 실행 권한 설정
          if [ -f ".github/scripts/changelog_manager.py" ]; then
            chmod +x .github/scripts/changelog_manager.py
          else
            echo "❌ changelog_manager.py를 찾을 수 없습니다"
            exit 1
          fi

          # 환경 변수 설정 후 Python 스크립트 실행
          export VERSION="$VERSION"
          export PROJECT_TYPE="$PROJECT_TYPE"
          export PROJECT_TYPES="$PROJECT_TYPES"
          export TODAY="$TODAY"
          export PR_NUMBER="$PR_NUMBER"
          export TIMESTAMP="$TIMESTAMP"

          python3 .github/scripts/changelog_manager.py update-from-summary

          echo "📄 CHANGELOG.md 재생성 중..."
          python3 .github/scripts/changelog_manager.py generate-md

      - name: 변경사항 커밋 및 푸시
        run: |
          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
          # bump가 version.yml + 프로젝트 버전 파일도 수정하므로 전체 스테이징
          git add -A

          if git diff --staged --quiet; then
            echo "📝 변경사항이 없습니다"
          else
            REPO_NAME=$(basename "${{ github.repository }}")
            VERSION="${{ steps.bump_version.outputs.new_version }}"

            # [skip ci] 미포함 의도: 이 커밋이 develop→main 머지로 main HEAD가 되어야
            # 배포/동기화 워크플로우(CICD·NPM-PUBLISH·README-UPDATE·PLUGIN-SYNC)가 main push로 트리거된다.
            # VERSION-CONTROL 안전망은 paths-ignore(version.yml) + release_guard(version.yml 변경 감지)로
            # 이 커밋을 릴리스로 인식해 재bump를 건너뛰므로 무한 루프가 없다.
            # develop을 트리거로 쓰는 워크플로우는 없어 develop push에서 중복 CI도 발생하지 않는다.
            git commit -m "$REPO_NAME 버전 관리 : chore : v$VERSION 릴리즈 버전 확정 및 릴리즈 문서 업데이트 (PR #${{ github.event.pull_request.number }})"

            # Race Condition 방지: pull-rebase 후 push (최대 3회 재시도)
            MAX_RETRIES=3
            RETRY_COUNT=0
            PUSH_SUCCESS=false

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "🔄 Push 시도 $RETRY_COUNT/$MAX_RETRIES..."

              if git push origin HEAD:$HEAD_BRANCH; then
                PUSH_SUCCESS=true
                echo "✅ 변경사항 커밋 완료"
                break
              else
                echo "⚠️ Push 실패, remote 변경사항 동기화 중..."
                if git pull --rebase origin $HEAD_BRANCH; then
                  echo "✅ Rebase 성공, 다시 push 시도..."
                else
                  echo "❌ Rebase 실패, 충돌 해결 필요"
                  git rebase --abort 2>/dev/null || true
                  exit 1
                fi
              fi
            done

            if [ "$PUSH_SUCCESS" = false ]; then
              echo "❌ $MAX_RETRIES회 시도 후에도 push 실패"
              exit 1
            fi
          fi

      - name: 임시 파일 정리
        run: rm -f pr_body.md

  # Job 3: PR 머지 및 배포 트리거
  merge-and-deploy:
    name: PR 머지 및 배포 트리거
    runs-on: ubuntu-latest
    needs: [detect-and-parse, fallback-summary, update-changelog]
    if: |
      always() &&
      needs.update-changelog.result == 'success' &&
      (needs.detect-and-parse.outputs.summary_found == 'true' ||
       needs.fallback-summary.outputs.summary_found == 'true')
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v5
        with:
          token: ${{ secrets._GITHUB_PAT_TOKEN }}
          fetch-depth: 0

      - name: Git 설정
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: PR 브랜치 최신화
        env:
          GH_TOKEN: ${{ secrets._GITHUB_PAT_TOKEN }}
        run: |
          PR_HEAD=$(gh pr view ${{ github.event.pull_request.number }} --json headRefName -q .headRefName)
          PR_BASE=$(gh pr view ${{ github.event.pull_request.number }} --json baseRefName -q .baseRefName)

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 PR 정보:"
          echo "  • HEAD 브랜치: $PR_HEAD"
          echo "  • BASE 브랜치: $PR_BASE"
          echo "  • 목표: $PR_BASE 브랜치에 $PR_HEAD의 변경사항을 머지"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # 원격 브랜치 최신화
          echo "🔄 원격 브랜치 최신화 중..."
          git fetch origin $PR_HEAD
          git fetch origin $PR_BASE

          # BASE 브랜치(main)로 체크아웃
          echo "📦 $PR_BASE 브랜치로 체크아웃 중..."
          git checkout $PR_BASE
          git pull origin $PR_BASE

          # HEAD 브랜치(develop)의 최신 변경사항 다시 가져오기 (race condition 방지)
          echo "🔄 $PR_HEAD 브랜치의 최신 변경사항 가져오는 중..."
          git fetch origin $PR_HEAD

          # HEAD 브랜치(develop)의 변경사항을 BASE(main)에 머지
          echo "🔀 $PR_HEAD의 변경사항을 $PR_BASE에 머지 중..."
          if git merge --no-edit origin/$PR_HEAD; then
            echo "✅ 머지 성공"
          else
            echo "⚠️ 머지 충돌 발생"
            echo "충돌 파일:"
            git diff --name-only --diff-filter=U || true
            echo "❌ 머지 충돌로 인해 실패했습니다. 수동으로 해결 후 다시 시도하세요."
            exit 1
          fi

          # main 브랜치에 푸시 (다른 워크플로우 트리거)
          # Race Condition 방지: pull-rebase 후 push (최대 3회 재시도)
          echo "🚀 $PR_BASE 브랜치에 푸시 중..."
          MAX_RETRIES=3
          RETRY_COUNT=0
          PUSH_SUCCESS=false

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "🔄 Push 시도 $RETRY_COUNT/$MAX_RETRIES..."

            if git push origin $PR_BASE; then
              PUSH_SUCCESS=true
              echo "✅ $PR_BASE 브랜치에 푸시 완료 (배포 워크플로우 트리거됨)"
              break
            else
              echo "⚠️ Push 실패, remote 변경사항 동기화 중..."
              if git pull --rebase origin $PR_BASE; then
                echo "✅ Rebase 성공, 다시 push 시도..."
              else
                echo "❌ Rebase 실패, 충돌 해결 필요"
                git rebase --abort 2>/dev/null || true
                exit 1
              fi
            fi
          done

          if [ "$PUSH_SUCCESS" = false ]; then
            echo "❌ $MAX_RETRIES회 시도 후에도 push 실패"
            exit 1
          fi

      - name: 자동 PR Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          
          # PAT 토큰 존재 여부 확인
          if [ -z "${{ secrets._GITHUB_PAT_TOKEN }}" ]; then
            PAT_AVAILABLE="false"
          else
            PAT_AVAILABLE="true"
          fi
          
          # PR 상태 확인
          PR_STATE=$(gh pr view $PR_NUMBER --json state,mergeable -q '.state + "," + (.mergeable | tostring)')
          PR_STATE_VALUE=$(echo "$PR_STATE" | cut -d',' -f1)
          PR_MERGEABLE=$(echo "$PR_STATE" | cut -d',' -f2)

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 PR 상태 확인:"
          echo "  • 상태: $PR_STATE_VALUE"
          echo "  • 병합 가능: $PR_MERGEABLE"
          echo "  • PAT 토큰 사용 가능: $PAT_AVAILABLE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          if [ "$PR_STATE_VALUE" = "CLOSED" ] || [ "$PR_STATE_VALUE" = "MERGED" ]; then
            echo "✅ PR이 이미 닫혔거나 병합되었습니다"
            exit 0
          fi

          if [ "$PR_MERGEABLE" != "true" ]; then
            echo "⚠️ PR을 GitHub API로 병합할 수 없습니다"
            echo "💡 이미 'PR 브랜치 최신화' 단계에서 변경사항이 ${{ github.event.pull_request.base.ref }} 브랜치에 적용되었습니다"
            echo "📝 PR 상태를 업데이트합니다..."
            
            # PR에 댓글 추가
            export GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
            gh pr comment $PR_NUMBER --body "✅ 변경사항이 자동으로 ${{ github.event.pull_request.base.ref }} 브랜치에 적용되었습니다. PR을 수동으로 닫아주세요."
            
            echo "✅ PR 상태 업데이트 완료"
            exit 0
          fi

          # 머지 성공 여부 추적 변수
          MERGE_SUCCESS="false"

          # 1차 시도: GITHUB_TOKEN으로 머지 시도 (--admin 없이)
          echo ""
          echo "🔀 1차 시도: GITHUB_TOKEN으로 PR 병합 중..."
          export GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
          
          MERGE_OUTPUT=$(gh pr merge $PR_NUMBER --merge --delete-branch=false 2>&1)
          MERGE_EXIT_CODE=$?
          
          if [ $MERGE_EXIT_CODE -eq 0 ] && echo "$MERGE_OUTPUT" | grep -q "merged\|Merged"; then
            echo "✅ GITHUB_TOKEN으로 PR 병합 성공"
            MERGE_SUCCESS="true"
          else
            echo "⚠️ GITHUB_TOKEN으로 병합 실패"
            echo "   출력: $MERGE_OUTPUT"
            
            # PR 상태 재확인 (다른 프로세스가 머지했을 수 있음)
            PR_STATE_CHECK=$(gh pr view $PR_NUMBER --json state -q .state)
            if [ "$PR_STATE_CHECK" = "MERGED" ]; then
              echo "✅ PR이 이미 머지되었습니다"
              MERGE_SUCCESS="true"
            fi
          fi

          # 2차 시도: PAT 토큰으로 재시도 (--admin 플래그 사용)
          if [ "$MERGE_SUCCESS" = "false" ] && [ "$PAT_AVAILABLE" = "true" ]; then
            echo ""
            echo "🔀 2차 시도: PAT 토큰으로 PR 병합 중 (--admin 플래그 사용)..."
            export GH_TOKEN=${{ secrets._GITHUB_PAT_TOKEN }}
            
            MERGE_OUTPUT=$(gh pr merge $PR_NUMBER --merge --admin --delete-branch=false 2>&1)
            MERGE_EXIT_CODE=$?
            
            if [ $MERGE_EXIT_CODE -eq 0 ] && echo "$MERGE_OUTPUT" | grep -q "merged\|Merged"; then
              echo "✅ PAT 토큰으로 PR 병합 성공"
              MERGE_SUCCESS="true"
            else
              echo "❌ PAT 토큰으로도 병합 실패"
              echo "   출력: $MERGE_OUTPUT"
              
              # PR 상태 재확인
              PR_STATE_CHECK=$(gh pr view $PR_NUMBER --json state -q .state)
              if [ "$PR_STATE_CHECK" = "MERGED" ]; then
                echo "✅ PR이 이미 머지되었습니다"
                MERGE_SUCCESS="true"
              fi
            fi
          fi

          # 최종 실패 처리
          if [ "$MERGE_SUCCESS" = "false" ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌ PR 자동 병합 실패"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            if [ "$PAT_AVAILABLE" = "false" ]; then
              echo ""
              echo "⚠️ PAT 토큰이 설정되어 있지 않습니다."
              echo ""
              echo "📋 해결 방법:"
              echo "1. GitHub에서 Personal Access Token 생성"
              echo "   - https://github.com/settings/tokens"
              echo "   - 권한: repo (전체 권한)"
              echo ""
              echo "2. Repository Secrets에 등록"
              echo "   - Settings > Secrets and variables > Actions"
              echo "   - New repository secret"
              echo "   - Name: _GITHUB_PAT_TOKEN"
              echo "   - Value: 생성한 토큰"
              echo ""
              echo "또는"
              echo ""
              echo "3. Branch Protection Rules 조정"
              echo "   - Settings > Branches > Branch protection rules"
              echo "   - 'Allow specified actors to bypass required pull requests'"
              echo "   - GitHub Actions bot을 예외로 추가"
              echo ""
            else
              echo ""
              echo "⚠️ GITHUB_TOKEN과 PAT 토큰 모두로 병합에 실패했습니다."
              echo ""
              echo "📋 가능한 원인:"
              echo "1. Branch Protection Rules가 너무 엄격함"
              echo "2. PR에 충돌이 있음"
              echo "3. 필수 상태 체크가 통과하지 않음"
              echo "4. 필수 리뷰 승인이 없음"
              echo ""
            fi
            
            # PR에 댓글 추가
            export GH_TOKEN=${{ secrets.GITHUB_TOKEN }}
            ERROR_COMMENT="❌ 자동 병합 실패. 수동으로 병합해주세요."
            if [ "$PAT_AVAILABLE" = "false" ]; then
              ERROR_COMMENT="❌ 자동 병합 실패: PAT 토큰이 설정되어 있지 않습니다. Settings > Secrets에 \`_GITHUB_PAT_TOKEN\`을 등록하거나 Branch Protection Rules에서 GitHub Actions bot을 예외로 추가해주세요."
            fi
            gh pr comment $PR_NUMBER --body "$ERROR_COMMENT"
            
            exit 1
          fi
          
          echo ""
          echo "✅ PR 자동 병합 완료"

      - name: 릴리스 태그 생성
        run: |
          NEW_VERSION="${{ needs.update-changelog.outputs.new_version }}"
          TAG_NAME="v$NEW_VERSION"
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"

          git fetch origin $BASE_BRANCH
          git checkout $BASE_BRANCH
          git pull origin $BASE_BRANCH

          if git tag -l | grep -q "^$TAG_NAME$"; then
            echo "⚠️ 태그 $TAG_NAME 이미 존재 — 건너뜀"
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
            echo "✅ 릴리스 태그 생성: $TAG_NAME"
          fi

      - name: 배포 완료 알림
        run: |
          echo "🎉 체인지로그 업데이트 및 배포 트리거 완료!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 배포 정보:"
          echo "  • 버전: ${{ needs.update-changelog.outputs.new_version }}"
          echo "  • 프로젝트: ${{ needs.detect-and-parse.outputs.project_type }}"
          echo "  • PR: #${{ github.event.pull_request.number }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
