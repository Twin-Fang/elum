spring:
  profiles:
    active: prod
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
        format_sql: true
        use_sql_comments: true
  jackson:
    time-zone: Asia/Seoul
  servlet:
    multipart:
      enabled: true # 파일 업로드 허용
      max-file-size: 200MB # 업로드 파일 최대 크기
      max-request-size: 1000MB # 요청 전체 최대 크기
      file-size-threshold: 10MB
  mvc:
    format:
      date-time: "yyyy-MM-dd'T'HH:mm:ss"
  flyway:
    enabled: true
    # 기존 스키마가 이미 ddl-auto: update로 만들어져 있어 Flyway 마이그레이션 이력이 없으므로,
    # 첫 실행 시 현재 상태를 베이스라인으로 잡고 그 이후 버전만 적용하게 한다.
    baseline-on-migrate: true
    # 기본 baseline 버전은 1인데, 이 값이면 V1 마이그레이션이 "이미 적용된 것"으로 취급돼
    # 건너뛴다. 0으로 낮춰야 V1이 실제로 실행된다.
    baseline-version: 0

chuseok22:
  api-change-log:
    enabled: true
    entries-to-show: 10
    date-format: "yyyy-MM-dd"
  logging:
    enabled: true

server:
  forward-headers-strategy: framework

springdoc:
  title: ELUM API
  description: 이룸(ELUM) 보호자/아동 행동 카드 서비스 API 문서
  version: 0.0.1

  servers:
    - url: https://api.elum.chuseok22.com
      description: main-server
    - url: http://localhost:8080
      description: local-server

  default-consumes-media-type: application/json;charset=UTF-8
  default-produces-media-type: application/json;charset=UTF-8
  swagger-ui:
    path: /docs/swagger
