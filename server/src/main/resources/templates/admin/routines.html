<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>이룸 관리자 - 루틴 관리</title>
  <th:block th:replace="~{admin/fragments/admin-layout :: headAssets}"></th:block>
</head>
<body class="min-h-screen bg-base-100">
<div class="flex">
  <div th:replace="~{admin/fragments/admin-layout :: sidebar('routines')}"></div>
  <main class="flex-1 p-8 space-y-6">
    <h1 class="text-2xl font-bold">루틴 관리</h1>
    <div class="overflow-x-auto">
      <table class="table">
        <thead>
        <tr>
          <th>제목</th>
          <th>보호자</th>
          <th>상태</th>
          <th>예정일시</th>
          <th>완료일시</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(routines)}">
          <td colspan="5" class="text-center text-base-content/60">생성된 루틴이 없습니다.</td>
        </tr>
        <tr th:each="routine : ${routines}">
          <td>
            <a th:href="@{/admin/routines/{id}(id=${routine.id()})}" class="link link-hover font-medium"
               th:text="${routine.title()}">제목</a>
          </td>
          <td th:text="${routine.memberNickname() ?: routine.memberUsername()}">보호자</td>
          <td>
            <span th:if="${routine.status().name() == 'PENDING_REVIEW'}" class="badge badge-warning">검토 대기</span>
            <span th:if="${routine.status().name() == 'CONFIRMED'}" class="badge badge-info">확정</span>
            <span th:if="${routine.status().name() == 'COMPLETED'}" class="badge badge-success">완료</span>
          </td>
          <td th:text="${#temporals.format(routine.scheduledAt(), 'yyyy-MM-dd HH:mm')}">일시</td>
          <td th:text="${routine.completedAt() != null ? #temporals.format(routine.completedAt(), 'yyyy-MM-dd HH:mm') : '-'}">-</td>
        </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
</body>
</html>
