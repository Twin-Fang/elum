<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>이룸 관리자 - 프롬프트 이력</title>
  <th:block th:replace="~{admin/fragments/admin-layout :: headAssets}"></th:block>
</head>
<body class="min-h-screen bg-base-100">
<div class="flex">
  <div th:replace="~{admin/fragments/admin-layout :: sidebar('prompts')}"></div>
  <main class="flex-1 p-8">
    <div class="max-w-4xl mx-auto space-y-6">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold" th:text="${prompt.promptKey.label} + ' — 변경 이력'">프롬프트 변경 이력</h1>
        <a th:href="@{/admin/prompts}" class="btn btn-ghost btn-sm">← 프롬프트 관리로</a>
      </div>

      <div class="card bg-base-100 shadow-md border border-primary/30">
        <div class="card-body space-y-2">
          <h2 class="card-title text-base">현재 적용본</h2>
          <p class="text-sm text-base-content/60">
            마지막 수정: <span th:text="${prompt.updatedAt}"></span>
          </p>
          <pre class="bg-base-200 rounded p-3 text-xs whitespace-pre-wrap" th:text="${prompt.content}"></pre>
        </div>
      </div>

      <div th:if="${#lists.isEmpty(histories)}" class="card bg-base-200">
        <div class="card-body items-center text-center text-base-content/60">
          <p class="text-lg">아직 변경 이력이 없습니다</p>
          <p class="text-sm">프롬프트를 수정하면 교체되기 직전의 내용이 여기에 쌓입니다.</p>
        </div>
      </div>

      <div th:unless="${#lists.isEmpty(histories)}" class="space-y-3">
        <h2 class="text-lg font-semibold" th:text="'이전 버전 (' + ${#lists.size(histories)} + '건, 최신순)'"></h2>

        <div th:each="history : ${histories}" class="collapse collapse-arrow bg-base-100 border border-base-300">
          <input type="checkbox"/>
          <div class="collapse-title text-sm font-medium">
            <span th:text="${history.createdAt}"></span>
            <span class="text-base-content/50">에 교체된 버전</span>
          </div>
          <div class="collapse-content space-y-3">
            <pre class="bg-base-200 rounded p-3 text-xs whitespace-pre-wrap" th:text="${history.content}"></pre>
            <!-- 복원은 기존 저장 엔드포인트를 그대로 재사용한다. 복원 자체도 이력으로 남는다. -->
            <form th:action="@{/admin/prompts/{key}(key=${prompt.promptKey})}" method="post"
                  onsubmit="return confirm('이 버전으로 복원할까요? 현재 적용본은 이력으로 보관됩니다.');">
              <textarea name="content" class="hidden" th:text="${history.content}"></textarea>
              <button type="submit" class="btn btn-outline btn-sm">이 버전으로 복원</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
