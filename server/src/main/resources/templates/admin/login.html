<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>이룸 관리자 로그인</title>
  <th:block th:replace="~{admin/fragments/admin-layout :: headAssets}"></th:block>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center">
<div class="card w-96 bg-base-100 shadow-xl">
  <div class="card-body">
    <h1 class="text-2xl font-bold text-center mb-4">이룸 관리자 로그인</h1>
    <form th:action="@{/admin/login}" method="post" class="space-y-4">
      <div class="form-control">
        <label class="label" for="username"><span class="label-text">아이디</span></label>
        <input type="text" id="username" name="username" class="input input-bordered w-full" required>
      </div>
      <div class="form-control">
        <label class="label" for="password"><span class="label-text">비밀번호</span></label>
        <input type="password" id="password" name="password" class="input input-bordered w-full" required>
      </div>
      <button type="submit" class="btn btn-primary w-full">로그인</button>
    </form>
  </div>
</div>
</body>
</html>
